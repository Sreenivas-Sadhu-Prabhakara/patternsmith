<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face { font-family: 'x'; src: local('Arial'); } /* noop to avoid FOUT */
  :root {
    --bg: #0e1117;
    --panel: #12161f;
    --panel-2: #171c28;
    --line: #262d3d;
    --ink: #e6e9ef;
    --ink-dim: #98a1b3;
    --ink-faint: #6b7385;
    --accent: #f0742a;
    --accent-2: #5cc8d8;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: var(--mono);
    color: var(--ink);
    background:
      radial-gradient(900px 460px at 84% -12%, rgba(240,116,42,.16), transparent 60%),
      radial-gradient(760px 480px at 2% 4%, rgba(92,200,216,.10), transparent 58%),
      var(--bg);
    position: relative;
    overflow: hidden;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  /* faint anvil watermark, bottom-right */
  .wm {
    position: absolute;
    right: -40px; bottom: -60px;
    width: 460px; height: 460px;
    opacity: .06;
  }

  /* top: brand */
  .brand { display: flex; align-items: center; gap: 20px; }
  .mark { flex: none; }
  .wordmark { display: flex; flex-direction: column; line-height: 1.08; }
  .name { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; }
  .name b { color: var(--accent); font-weight: 700; }
  .kicker { color: var(--ink-dim); font-size: 20px; margin-top: 4px; letter-spacing: .01em; }

  /* middle: the forge transformation */
  .forge { display: flex; align-items: center; gap: 28px; }
  .slot {
    background: #0b0e14;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 30px;
    box-shadow: 0 2px 18px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.02);
  }
  .slot .slabel {
    font-size: 15px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--ink-faint); margin-bottom: 12px;
  }
  .slot.regex { flex: 0 0 auto; }
  .slot.regex .code { font-size: 30px; letter-spacing: -0.01em; }
  .slot.regex .code .sl { color: var(--accent); }
  .slot.regex .code .anc { color: #a6adff; }
  .slot.regex .code .cls { color: var(--accent-2); }
  .slot.regex .code .qua { color: var(--accent); }
  .slot.regex .code .lit { color: var(--ink); }

  .arrow {
    flex: none;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--accent);
  }
  .arrow .glyph { font-size: 40px; line-height: 1; }
  .arrow .word { font-size: 13px; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-faint); }

  .slot.english { flex: 1 1 auto; border-left: 3px solid var(--accent); }
  .slot.english .en {
    font-size: 24px; line-height: 1.42; color: var(--ink);
  }
  .slot.english .en em { color: var(--accent-2); font-style: normal; }

  /* bottom: strapline + privacy pill */
  .footline { display: flex; align-items: center; justify-content: space-between; }
  .strap { font-size: 22px; color: var(--ink-dim); }
  .strap b { color: var(--ink); font-weight: 600; }
  .pill {
    display: inline-flex; align-items: center; gap: 12px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 22px; background: var(--panel); font-size: 18px; color: var(--ink-dim);
  }
  .pill .dot { width: 12px; height: 12px; border-radius: 50%; background: #56b877; box-shadow: 0 0 0 4px rgba(86,184,119,.18); }
</style>
</head>
<body>
  <svg class="wm" viewBox="0 0 128 128" aria-hidden="true">
    <path d="M28 60 h58 l-9 15 h-30 a11 11 0 0 1 -11 -11 z" fill="#f0742a"/>
    <path d="M86 60 l16 -7 -5 14 z" fill="#f0742a"/>
    <g fill="none" stroke="#f0742a" stroke-width="7" stroke-linecap="round">
      <path d="M50 75 v20 M74 75 v20"/>
      <path d="M38 98 h48"/>
    </g>
  </svg>

  <div class="brand">
    <svg class="mark" viewBox="0 0 128 128" width="64" height="64" aria-hidden="true">
      <rect width="128" height="128" rx="26" fill="#12161f"/>
      <path d="M28 60 h58 l-9 15 h-30 a11 11 0 0 1 -11 -11 z" fill="#f0742a"/>
      <path d="M86 60 l16 -7 -5 14 z" fill="#f0742a"/>
      <g fill="none" stroke="#f0742a" stroke-width="7" stroke-linecap="round">
        <path d="M50 75 v20 M74 75 v20"/>
        <path d="M38 98 h48"/>
      </g>
      <path d="M98 28 l4 11 11 4 -11 4 -4 11 -4 -11 -11 -4 11 -4 z" fill="#5cc8d8"/>
    </svg>
    <div class="wordmark">
      <span class="name"><b>p</b>atternsmith</span>
      <span class="kicker">regex in plain English — both ways</span>
    </div>
  </div>

  <div class="forge">
    <div class="slot regex">
      <div class="slabel">regex</div>
      <div class="code"><span class="sl">/</span><span class="anc">^</span><span class="cls">\d{4}</span><span class="lit">-</span><span class="cls">\d{2}</span><span class="lit">-</span><span class="cls">\d{2}</span><span class="anc">$</span><span class="sl">/</span></div>
    </div>
    <div class="arrow">
      <span class="glyph">⇄</span>
      <span class="word">forge</span>
    </div>
    <div class="slot english">
      <div class="slabel">plain English</div>
      <div class="en">Start, then <em>four digits</em>, a dash, <em>two digits</em>, a dash, <em>two digits</em>, then end — an <em>ISO date</em>.</div>
    </div>
  </div>

  <div class="footline">
    <div class="strap">Explain a regex, test it live, or <b>build one from your intent</b>.</div>
    <div class="pill"><span class="dot"></span> runs entirely on your device</div>
  </div>
</body>
</html>
